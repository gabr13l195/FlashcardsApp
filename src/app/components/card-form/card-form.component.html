<div class="card-form-container">
  <div class="form-card">
    <div class="form-header">
      <h1>{{ isEditMode ? 'Editar Carta' : 'Nueva Carta' }}</h1>
      <button class="btn-icon" (click)="cancel()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <form [formGroup]="cardForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="front">Inglés (Frente) *</label>
        <input
          id="front"
          type="text"
          formControlName="front"
          placeholder="Ej: Hello"
          class="form-input"
          [class.error]="cardForm.get('front')?.invalid && cardForm.get('front')?.touched">
        @if (cardForm.get('front')?.invalid && cardForm.get('front')?.touched) {
          <span class="error-message">El texto en inglés es requerido</span>
        }
      </div>

      <div class="form-group">
        <label for="back">Español (Reverso) *</label>
        <input
          id="back"
          type="text"
          formControlName="back"
          placeholder="Ej: Hola"
          class="form-input"
          [class.error]="cardForm.get('back')?.invalid && cardForm.get('back')?.touched">
        @if (cardForm.get('back')?.invalid && cardForm.get('back')?.touched) {
          <span class="error-message">La traducción es requerida</span>
        }
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="cancel()">
          Cancelar
        </button>
        <button type="submit" class="btn-primary" [disabled]="cardForm.invalid">
          {{ isEditMode ? 'Guardar Cambios' : 'Crear Carta' }}
        </button>
      </div>
    </form>
  </div>
</div>
